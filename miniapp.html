<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>Game Platform</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0f;color:#fff;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}.logo{font-size:28px;font-weight:800;background:linear-gradient(135deg,#39ff14,#00f0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}.sub{color:#888;font-size:13px;margin-bottom:30px}.btn{display:block;width:100%;max-width:280px;padding:14px;border-radius:12px;font-size:16px;font-weight:600;text-align:center;margin-bottom:12px;cursor:pointer;border:none;text-decoration:none}.bp{background:linear-gradient(135deg,#39ff14,#00cc44);color:#000}.bs{background:#1a1a25;color:#fff;border:1px solid #fff3}.info{margin-top:20px;color:#555;font-size:11px;text-align:center}.emoji{font-size:40px;margin-bottom:12px}</style></head><body><div class="emoji">🎮</div><div class="logo">Game Platform</div><div class="sub">Играй в 3D игры</div><a class="btn bp" id="playBtn">▶ Играть</a><a class="btn bs" id="settingsBtn">⚙️ Настройки</a><div class="info">Откроется в браузере</div><script>var B='https://vladst6001.github.io/Program-game/';function go(p){var u=B+p;if(window.Telegram&&window.Telegram.WebApp&&window.Telegram.WebApp.initDataUnsafe){window.Telegram.WebApp.openLink(u)}else{window.open(u,'_blank')}}document.getElementById('playBtn').onclick=function(e){e.preventDefault();go('')};document.getElementById('settingsBtn').onclick=function(e){e.preventDefault();go('#/settings')};</script></body></html>
