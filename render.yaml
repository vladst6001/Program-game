services:
  - type: web
    name: game-platform-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: game-platform-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBAPP_URL
        value: https://game-platform-frontend.onrender.com
    autoDeploy: true

  - type: web
    name: game-platform-bot
    runtime: docker
    dockerfilePath: ./bot/Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BACKEND_URL
        value: https://game-platform-backend.onrender.com
    autoDeploy: true

  - type: web
    name: game-platform-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    autoDeploy: true

  - type: postgres
    name: game-platform-db
    databaseName: gameplatform
    plan: free
